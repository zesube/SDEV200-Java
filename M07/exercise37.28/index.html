<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 37.28 - Calculate Loan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    form {
      max-width: 420px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px;
      align-items: center;
    }

    button {
      grid-column: 1 / span 2;
      justify-self: start;
      padding: 8px 14px;
    }
  </style>
</head>
<body>
  <h2>Compute Loan Payment</h2>

  <form action="ComputeLoan" method="post">
    <label for="loanAmount">Loan Amount</label>
    <input id="loanAmount" name="loanAmount" type="number" step="0.01" min="0" required>

    <label for="annualInterestRate">Annual Interest Rate (%)</label>
    <input id="annualInterestRate" name="annualInterestRate" type="number" step="0.01" min="0" required>

    <label for="numberOfYears">Number of Years</label>
    <input id="numberOfYears" name="numberOfYears" type="number" min="1" required>

    <button type="submit">Compute Loan Payment</button>
  </form>
</body>
</html>
